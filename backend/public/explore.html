<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk2Scale DB Explorer</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
      :root {
        color-scheme: light dark;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #0f172a;
        color: #e2e8f0;
      }

      input,
      select {
        width: 100%;
        font-size: 14px;
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #334155;
        background: #0b1220;
        color: #e2e8f0;
      }

      .layout {
        height: 100vh;
        display: flex;
      }

      .search-panel {
        width: 25%;
        min-width: 280px;
        border-right: 1px solid #334155;
        background: #0b1220;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .search-panel-content {
        height: 100%;
        min-height: 0;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .search-panel-title {
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 4px;
      }

      .status {
        color: #cbd5e1;
        font-size: 13px;
      }

      .error {
        color: #fca5a5;
      }

      .result-list {
        flex: 1;
        min-height: 0;
        margin-top: 8px;
        overflow-y: auto;
        border: 1px solid #334155;
        border-radius: 10px;
        background: #111827;
      }

      .list-item {
        width: 100%;
        border: 0;
        border-bottom: 1px solid #1f2937;
        background: transparent;
        color: inherit;
        cursor: pointer;
        padding: 10px 12px;
        text-align: left;
        display: block;
      }

      .list-item:last-child {
        border-bottom: 0;
      }

      .list-item:hover {
        background: #1e293b;
      }

      .list-item.selected {
        background: #1d4ed8;
      }

      .list-item-id {
        color: #93c5fd;
        margin-right: 8px;
      }

      .detail-panel {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow: hidden;
      }

      .card {
        width: 100%;
        border: 1px solid #334155;
        background: #111827;
        border-radius: 10px;
        padding: 12px;
      }

      .card-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 10px;
      }

      .nutrients-card {
        min-height: 210px;
        max-height: 260px;
        overflow: auto;
      }

      .nutrient-group-tabs {
        display: flex;
        gap: 6px;
        margin-bottom: 10px;
        overflow-x: auto;
        padding-bottom: 4px;
      }

      .nutrient-group-tab {
        padding: 6px 12px;
        font-size: 13px;
        border: 1px solid #334155;
        border-radius: 999px;
        background: #0b1220;
        color: #e2e8f0;
        cursor: pointer;
        white-space: nowrap;
      }

      .nutrient-group-tab:hover {
        background: #1e293b;
      }

      .nutrient-group-tab.active {
        background: #1d4ed8;
        border-color: #1d4ed8;
      }

      .nutrient-table-wrap {
        overflow-x: auto;
      }

      .nutrient-table {
        border-collapse: collapse;
        min-width: 100%;
        width: max-content;
      }

      .nutrient-table th,
      .nutrient-table td {
        border: 1px solid #334155;
        padding: 8px 10px;
        text-align: left;
        white-space: nowrap;
      }

      .tree-card {
        flex: 1;
        overflow: auto;
      }

      .tree-node {
        padding: 8px 10px;
        margin-top: 6px;
        border: 1px solid #334155;
        border-radius: 8px;
        background: #0b1220;
      }

      .tree-node-label {
        display: inline-block;
        padding: 0;
      }

      .card-title-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .card-title-controls {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      .mass-input {
        width: 90px;
        padding: 6px 8px;
        font-size: 13px;
      }

      .measure-select {
        width: 180px;
        padding: 6px 8px;
        font-size: 13px;
      }

      .muted {
        color: #94a3b8;
      }

      .placeholder {
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #94a3b8;
        border: 1px dashed #334155;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel">
      const { useEffect, useMemo, useState } = React;

      const TYPE_OPTIONS = [
        { value: "nutrient", label: "Nutrient" },
        { value: "whole_food", label: "Whole food" },
        { value: "recipe", label: "Recipe" },
        { value: "branded_food", label: "Branded food" }
      ];

      function formatNumber(value) {
        if (typeof value !== "number" || Number.isNaN(value)) {
          return "-";
        }
        return Number(value.toFixed(6)).toString();
      }

      function TreeNode({ node, depth }) {
        return (
          <div>
            <div className="tree-node" style={{ marginLeft: `${depth * 20}px` }}>
              <span className="tree-node-label">
                {node.name} <span className="muted">({formatNumber(node.ratio)})</span>
              </span>
            </div>
            {node.type !== "nutrient" &&
              Array.isArray(node.children) &&
              node.children.map((child) => (
                <TreeNode key={`${child.id}-${depth}-${child.name}`} node={child} depth={depth + 1} />
              ))}
          </div>
        );
      }

      function TreeCard({ selectedElement }) {
        const [tree, setTree] = useState(null);
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState("");

        useEffect(() => {
          if (!selectedElement) {
            setTree(null);
            setError("");
            return;
          }

          const controller = new AbortController();

          async function loadTree() {
            setIsLoading(true);
            setError("");

            try {
              const response = await fetch(`/element/${selectedElement.id}/tree`, {
                signal: controller.signal
              });

              if (!response.ok) {
                throw new Error(`Tree request failed with ${response.status}`);
              }

              const payload = await response.json();
              setTree(payload);
            } catch (err) {
              if (err.name === "AbortError") {
                return;
              }
              setTree(null);
              setError(err.message ?? "Failed to load tree");
            } finally {
              setIsLoading(false);
            }
          }

          loadTree();
          return () => controller.abort();
        }, [selectedElement]);

        return (
          <section className="card tree-card">
            <div className="card-title">Tree</div>
            {isLoading && <div className="status">Loading tree...</div>}
            {error && <div className="status error">{error}</div>}
            {!isLoading && !error && !tree && <div className="status">No tree data</div>}
            {!isLoading && !error && tree && <TreeNode node={tree} depth={0} />}
          </section>
        );
      }

      function NutrientsCard({ selectedElement }) {
        const [groups, setGroups] = useState([]);
        const [measures, setMeasures] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState("");
        const [mass, setMass] = useState("100");
        const [debouncedMass, setDebouncedMass] = useState("100");
        const [selectedMeasureId, setSelectedMeasureId] = useState("");
        const [selectedGroupId, setSelectedGroupId] = useState(null);

        useEffect(() => {
          const timer = window.setTimeout(() => {
            setDebouncedMass(mass.trim());
          }, 300);
          return () => window.clearTimeout(timer);
        }, [mass]);

        useEffect(() => {
          if (!selectedElement) {
            setMeasures([]);
            setSelectedMeasureId("");
            return;
          }

          const controller = new AbortController();

          async function loadMeasures() {
            try {
              const response = await fetch(`/measures/${selectedElement.id}`, {
                signal: controller.signal
              });
              if (!response.ok) {
                throw new Error(`Measures request failed with ${response.status}`);
              }

              const payload = await response.json();
              setMeasures(Array.isArray(payload) ? payload : []);
              setSelectedMeasureId("");
            } catch (err) {
              if (err.name === "AbortError") {
                return;
              }
              setMeasures([]);
            }
          }

          loadMeasures();
          return () => controller.abort();
        }, [selectedElement]);

        const selectedMeasure = useMemo(() => {
          if (!selectedMeasureId) {
            return null;
          }
          return measures.find((measure) => String(measure.id) === selectedMeasureId) ?? null;
        }, [measures, selectedMeasureId]);

        const effectiveMass = useMemo(() => {
          const normalizedMass = Number(debouncedMass);
          if (!Number.isFinite(normalizedMass) || normalizedMass <= 0) {
            return Number.NaN;
          }

          if (!selectedMeasure) {
            return normalizedMass;
          }

          return normalizedMass * selectedMeasure.grams;
        }, [debouncedMass, selectedMeasure]);

        useEffect(() => {
          if (!selectedElement) {
            setGroups([]);
            setError("");
            return;
          }

          const controller = new AbortController();

          async function loadNutrients() {
            setIsLoading(true);
            setError("");

            try {
              if (!Number.isFinite(effectiveMass) || effectiveMass <= 0) {
                setGroups([]);
                setError("Amount must be a positive number");
                return;
              }

              const params = new URLSearchParams();
              params.set("mass", effectiveMass.toString());
              const response = await fetch(`/element/${selectedElement.id}/nutrients?${params.toString()}`, {
                signal: controller.signal
              });
              if (!response.ok) {
                throw new Error(`Nutrients request failed with ${response.status}`);
              }

              const payload = await response.json();
              setGroups(Array.isArray(payload) ? payload : []);
            } catch (err) {
              if (err.name === "AbortError") {
                return;
              }
              setGroups([]);
              setError(err.message ?? "Failed to load nutrients");
            } finally {
              setIsLoading(false);
            }
          }

          loadNutrients();
          return () => controller.abort();
        }, [selectedElement, effectiveMass]);

        useEffect(() => {
          if (groups.length === 0) {
            return;
          }
          const stillPresent = groups.some((group) => group.id === selectedGroupId);
          if (!stillPresent) {
            setSelectedGroupId(groups[0].id);
          }
        }, [groups, selectedGroupId]);

        const activeGroup = useMemo(() => {
          if (groups.length === 0) return null;
          return groups.find((group) => group.id === selectedGroupId) ?? groups[0];
        }, [groups, selectedGroupId]);

        const activeNutrients = activeGroup?.nutrients ?? [];

        return (
          <section className="card nutrients-card">
            <div className="card-title card-title-row">
              <span>Nutrients</span>
              <label className="card-title-controls">
                <span className="muted">Amount</span>
                <input
                  className="mass-input"
                  type="number"
                  min="0.000001"
                  step="any"
                  value={mass}
                  onChange={(event) => setMass(event.target.value)}
                />
                <select
                  className="measure-select"
                  value={selectedMeasureId}
                  onChange={(event) => setSelectedMeasureId(event.target.value)}
                >
                  <option value="">Grams</option>
                  {measures.map((measure) => (
                    <option key={measure.id} value={String(measure.id)}>
                      {measure.name}
                    </option>
                  ))}
                </select>
                {selectedMeasure && Number.isFinite(effectiveMass) && effectiveMass > 0 && (
                  <span className="muted">(= {formatNumber(effectiveMass)} g)</span>
                )}
              </label>
            </div>
            {groups.length > 0 && (
              <div className="nutrient-group-tabs">
                {groups.map((group) => (
                  <button
                    key={group.id}
                    type="button"
                    className={`nutrient-group-tab ${(activeGroup?.id ?? null) === group.id ? "active" : ""}`}
                    onClick={() => setSelectedGroupId(group.id)}
                  >
                    {group.name}
                  </button>
                ))}
              </div>
            )}
            {isLoading && <div className="status">Loading nutrients...</div>}
            {error && <div className="status error">{error}</div>}
            {!isLoading && !error && activeNutrients.length === 0 && (
              <div className="status">No nutrients found</div>
            )}
            {!isLoading && !error && activeNutrients.length > 0 && (
              <div className="nutrient-table-wrap">
                <table className="nutrient-table">
                  <thead>
                    <tr>
                      {activeNutrients.map((nutrient, index) => (
                        <th key={nutrient.id ?? `calc:${nutrient.name}:${index}`}>{nutrient.name}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      {activeNutrients.map((nutrient, index) => (
                        <td key={nutrient.id ?? `calc:${nutrient.name}:${index}`}>{formatNumber(nutrient.amount)}</td>
                      ))}
                    </tr>
                  </tbody>
                </table>
              </div>
            )}
          </section>
        );
      }

      function DetailPanel({ selectedElement }) {
        if (!selectedElement) {
          return (
            <section className="detail-panel">
              <div className="placeholder">Select an element from the left list</div>
            </section>
          );
        }

        return (
          <section className="detail-panel">
            <NutrientsCard selectedElement={selectedElement} />
            <TreeCard selectedElement={selectedElement} />
          </section>
        );
      }

      function SearchPanel({ selectedElementId, onSelect }) {
        const [filter, setFilter] = useState("");
        const [debouncedFilter, setDebouncedFilter] = useState("");
        const [type, setType] = useState("nutrient");
        const [elements, setElements] = useState([]);
        const [isLoading, setIsLoading] = useState(false);
        const [error, setError] = useState("");

        useEffect(() => {
          const timer = window.setTimeout(() => {
            setDebouncedFilter(filter.trim());
          }, 300);
          return () => window.clearTimeout(timer);
        }, [filter]);

        const queryString = useMemo(() => {
          const params = new URLSearchParams();
          if (type) {
            params.set("type", type);
          }
          if (debouncedFilter) {
            params.set("filter", debouncedFilter);
          }
          return params.toString();
        }, [type, debouncedFilter]);

        useEffect(() => {
          const controller = new AbortController();

          async function loadElements() {
            setIsLoading(true);
            setError("");

            try {
              const response = await fetch(`/elements?${queryString}`, {
                signal: controller.signal
              });
              if (!response.ok) {
                throw new Error(`Elements request failed with ${response.status}`);
              }

              const payload = await response.json();
              const nextElements = Array.isArray(payload) ? payload : [];
              setElements(nextElements);

              if (
                selectedElementId !== null &&
                !nextElements.some((element) => element.id === selectedElementId)
              ) {
                onSelect(null);
              }
            } catch (err) {
              if (err.name === "AbortError") {
                return;
              }
              setError(err.message ?? "Failed to load elements");
              setElements([]);
            } finally {
              setIsLoading(false);
            }
          }

          loadElements();
          return () => controller.abort();
        }, [queryString, selectedElementId, onSelect]);

        return (
          <aside className="search-panel">
            <div className="search-panel-content">
              <div className="search-panel-title">DB Explorer</div>
              <input
                type="text"
                value={filter}
                placeholder="Search by name..."
                onChange={(event) => setFilter(event.target.value)}
              />
              <select value={type} onChange={(event) => setType(event.target.value)}>
                {TYPE_OPTIONS.map((option) => (
                  <option key={option.value} value={option.value}>
                    {option.label}
                  </option>
                ))}
              </select>

              <div className="status">
                {isLoading ? "Loading..." : `Found ${elements.length} element(s)`}
              </div>
              {error && <div className="status error">{error}</div>}

              <div className="result-list">
                {elements.map((element) => (
                  <button
                    key={element.id}
                    type="button"
                    className={`list-item ${selectedElementId === element.id ? "selected" : ""}`}
                    onClick={() => onSelect({ id: element.id, type: element.type, name: element.name })}
                  >
                    <span className="list-item-id">{element.id}</span>
                    <span>{element.name}</span>
                  </button>
                ))}
              </div>
            </div>
          </aside>
        );
      }

      function App() {
        const [selectedElement, setSelectedElement] = useState(null);

        return (
          <main className="layout">
            <SearchPanel
              selectedElementId={selectedElement?.id ?? null}
              onSelect={setSelectedElement}
            />
            <DetailPanel selectedElement={selectedElement} />
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
